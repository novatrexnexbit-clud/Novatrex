<!DOCTYPE html>
<html>
<head>
<title>Register - NOVATREX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="header">
<div class="logo">NOVATREX</div>
</div>

<div class="container auth-container">
<div class="glass card auth-card">

<h2 class="auth-title">Créer un compte</h2>

<input type="email" id="authRegisterEmail" class="auth-input" placeholder="Email">
<input type="password" id="authRegisterPassword" class="auth-input" placeholder="Mot de passe">

<button id="authRegisterBtn" class="auth-button">
<span class="auth-btn-text">Créer un compte</span>
<div class="auth-spinner"></div>
</button>

<div id="authRegisterMessage" class="auth-message"></div>

<br>
<a href="login.html">Se connecter</a>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
