<!DOCTYPE html>
<html>
<head>
<title>Login - NOVATREX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="header">
<div class="logo">NOVATREX</div>
</div>

<div class="container auth-container">
<div class="glass card auth-card">

<h2 class="auth-title">Connexion</h2>

<input type="email" id="authLoginEmail" class="auth-input" placeholder="Email">
<input type="password" id="authLoginPassword" class="auth-input" placeholder="Mot de passe">

<button id="authLoginBtn" class="auth-button">
<span class="auth-btn-text">Se connecter</span>
<div class="auth-spinner"></div>
</button>

<div id="authLoginMessage" class="auth-message"></div>

<br>
<a href="register.html">Créer un compte</a>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
